apiVersion: apps/v1
kind: Deployment
metadata:
  name: findthatproduct
  namespace: findthatproduct
  labels:
    app: findthatproduct
  annotations:
    keel.sh/policy: minor
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: findthatproduct
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: findthatproduct
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: findthatproduct
          image: ghcr.io/stevendejongnl/findthatproduct:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              value: info
            - name: ALLOWED_ORIGINS
              value: "https://findthatproduct.example.com"
          envFrom:
            - secretRef:
                name: findthatproduct-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
